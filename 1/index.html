<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>@veritycheck</title>
        <link rel="stylesheet" href="/1/style.css" />
        <link rel="icon" type="image/x-icon" href="/1/favicon.ico">
        <script type="importmap">
            {
                "imports": {
                    "three": "https://jsdelivr.net"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "https://unpkg.com/three@0.180.0/build/three.module.js";
            // 1. Scene Setup
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000,
            );
            camera.position.set(0, 0, 2.5);

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
            });
            renderer.setClearColor(0x000000, 0);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. Add Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // 3. Load Texture
            const textureLoader = new THREE.TextureLoader();
            const gridTexture = textureLoader.load("white.jpg");

            gridTexture.wrapS = THREE.RepeatWrapping;
            gridTexture.wrapT = THREE.RepeatWrapping;
            gridTexture.magFilter = THREE.NearestFilter;
            gridTexture.minFilter = THREE.LinearMipmapLinearFilter;

            // 4. Create a Parent Group
            const cubeGroup = new THREE.Group();
            cubeGroup.scale.set(0, 0, 0);
            scene.add(cubeGroup);

            // A. Main Textured Cube
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const mainMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
            });
            const mainCube = new THREE.Mesh(geometry, mainMaterial);
            cubeGroup.add(mainCube);

            // B. Inverted Outline Mesh (Cartoon Style)
            const outlineMaterial = new THREE.MeshBasicMaterial({
                color: 0x000000,
                side: THREE.BackSide,
            });
            const outlineCube = new THREE.Mesh(geometry, outlineMaterial);

            const outlineThickness = 1.1;
            outlineCube.scale.set(
                outlineThickness,
                outlineThickness,
                outlineThickness,
            );
            cubeGroup.add(outlineCube);

            // 5. Interaction Setup
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            let targetRotationX = 0;
            let targetRotationY = 0;
            let isPointerDown = false;
            let previousPointerX = 0;
            let previousPointerY = 0;

            window.addEventListener("pointerdown", (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(mainCube);

                if (intersects.length > 0) {
                    isPointerDown = true;
                    previousPointerX = e.clientX;
                    previousPointerY = e.clientY;
                }
            });

            window.addEventListener("pointermove", (e) => {
                if (!isPointerDown) {
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObject(mainCube);
                    document.body.style.cursor =
                        intersects.length > 0 ? "grab" : "default";
                    return;
                }
                document.body.style.cursor = "grabbing";
                const deltaX = e.clientX - previousPointerX;
                const deltaY = e.clientY - previousPointerY;

                targetRotationY += deltaX * 0.007;
                targetRotationX += deltaY * 0.007;

                previousPointerX = e.clientX;
                previousPointerY = e.clientY;
            });

            const stopDragging = () => {
                isPointerDown = false;
            };
            window.addEventListener("pointerup", stopDragging);
            window.addEventListener("pointerleave", stopDragging);

            // 6. Animation Loop
            function animate() {
                requestAnimationFrame(animate);

                // Pop-in effect on page startup
                if (cubeGroup.scale.x < 0.999) {
                    cubeGroup.scale.x += (1 - cubeGroup.scale.x) * 0.05;
                    cubeGroup.scale.y += (1 - cubeGroup.scale.y) * 0.05;
                    cubeGroup.scale.z += (1 - cubeGroup.scale.z) * 0.05;
                } else {
                    cubeGroup.scale.set(1, 1, 1);
                }

                if (!isPointerDown) {
                    targetRotationY += 0.0065;
                    targetRotationX += 0.001;
                }

                cubeGroup.rotation.y +=
                    (targetRotationY - cubeGroup.rotation.y) * 0.1;
                cubeGroup.rotation.x +=
                    (targetRotationX - cubeGroup.rotation.x) * 0.1;

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        </script>
    </head>
    <body>
        <h1 class="heading">@veritycheck</h1>
        <p class="subheading">I like white</p>
        <button onclick="window.location.href = '../2/'" class="next">
            Next Page
        </button>
    </body>
</html>
